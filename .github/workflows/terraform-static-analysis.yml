name: Terraform Static Code Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform-static-analysis.yml'

permissions:
  contents: read

jobs:
  terraform-static-analysis:
    name: Terraform Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive -no-color

      - name: Terraform init
        run: terraform init -backend=false -no-color

      - name: Terraform validate
        run: terraform validate -no-color

      # Static analysis via Checkov (as used by analytical-platform), replacing
      # the previous tflint-based action which crashed during plugin install
      # (sigstore attestation verification panic in `tflint --init`).
      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: .
          framework: terraform
          download_external_modules: false
          quiet: true
          output_format: cli
          skip_check: CKV_GIT_1,CKV_AWS_126,CKV2_AWS_38,CKV2_AWS_39
